name: CD

run-name: "DIT CD | ${{ inputs.environment }} | ${{ inputs.tag || 'latest from DynamoDB' }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - shared-services-non-prod
          - shared-services-prod
      tag:
        description: 'Custom image tag (non-prod only). Prod always uses latest from DynamoDB.'
        required: false
        type: string
      dry_run:
        description: 'Dry run (preview without deploying)'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 699475938885.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: punchh/dynamic-image-transformation
  DYNAMO_TABLE: punchh-ServicesVersion
  DYNAMO_ROLE_ARN: arn:aws:iam::569345298987:role/punchh-ServicesVersionRole
  K8S_NAMESPACE: image-transformation
  K8S_DEPLOYMENT: image-transformation
  K8S_CONTAINER: image-transformation

permissions:
  id-token: write
  contents: read

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      image: ${{ steps.resolve.outputs.image }}
      eks_cluster: ${{ steps.resolve.outputs.eks_cluster }}
      aws_account: ${{ steps.resolve.outputs.aws_account }}
    steps:
      - name: Configure AWS credentials for DynamoDB
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.DYNAMO_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Resolve deployment tag
        id: resolve
        run: |
          ENVIRONMENT="${{ inputs.environment }}"

          # Map environment to DynamoDB env and EKS cluster
          case "$ENVIRONMENT" in
            shared-services-non-prod)
              DYNAMO_ENV="development"
              EKS_CLUSTER="shared-services-non-prod"
              AWS_ACCOUNT="390378413197"
              ;;
            shared-services-prod)
              DYNAMO_ENV="production"
              EKS_CLUSTER="shared-services-prod"
              AWS_ACCOUNT="986718858289"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          # Resolve tag
          MANUAL_TAG="${{ inputs.tag }}"

          if [[ "$ENVIRONMENT" == "shared-services-prod" ]]; then
            # Production: always fetch from DynamoDB, ignore manual tag
            if [[ -n "$MANUAL_TAG" ]]; then
              echo "⚠️  Manual tag ignored for production. Fetching latest from DynamoDB."
            fi
            TAG=$(aws dynamodb get-item \
              --table-name "$DYNAMO_TABLE" \
              --key "{\"PK\":{\"S\":\"ENV#${DYNAMO_ENV}\"},\"SK\":{\"S\":\"STACK#default#REPO#dynamic-image-transformation\"}}" \
              --output json | jq -r '.Item.tags.L[-1].S // empty')

            if [[ -z "$TAG" ]]; then
              echo "::error::No tag found in DynamoDB for ENV#${DYNAMO_ENV}"
              exit 1
            fi
            echo "Resolved tag from DynamoDB (ENV#${DYNAMO_ENV}): $TAG"
          else
            # Non-prod: use manual tag if provided, otherwise fetch from DynamoDB
            if [[ -n "$MANUAL_TAG" ]]; then
              TAG="$MANUAL_TAG"
              echo "Using custom tag for non-prod: $TAG"
            else
              TAG=$(aws dynamodb get-item \
                --table-name "$DYNAMO_TABLE" \
                --key "{\"PK\":{\"S\":\"ENV#${DYNAMO_ENV}\"},\"SK\":{\"S\":\"STACK#default#REPO#dynamic-image-transformation\"}}" \
                --output json | jq -r '.Item.tags.L[-1].S // empty')

              if [[ -z "$TAG" ]]; then
                echo "::error::No tag found in DynamoDB for ENV#${DYNAMO_ENV}"
                exit 1
              fi
              echo "Resolved tag from DynamoDB (ENV#${DYNAMO_ENV}): $TAG"
            fi
          fi

          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "eks_cluster=$EKS_CLUSTER" >> $GITHUB_OUTPUT
          echo "aws_account=$AWS_ACCOUNT" >> $GITHUB_OUTPUT

          echo "📦 Deployment Summary:"
          echo "  Environment: $ENVIRONMENT"
          echo "  EKS Cluster: $EKS_CLUSTER"
          echo "  AWS Account: $AWS_ACCOUNT"
          echo "  Image: $IMAGE"

  approval:
    needs: resolve-tag
    if: ${{ inputs.environment == 'shared-services-prod' }}
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - name: Approval Gate
        run: |
          echo "✅ Production deployment approved"
          echo "  Tag: ${{ needs.resolve-tag.outputs.tag }}"
          echo "  Cluster: ${{ needs.resolve-tag.outputs.eks_cluster }}"

  deploy:
    needs: [resolve-tag, approval]
    if: ${{ always() && needs.resolve-tag.result == 'success' && (needs.approval.result == 'success' || needs.approval.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials for EKS
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ needs.resolve-tag.outputs.aws_account }}:role/GitHubActionsEKSManagementRole-${{ inputs.environment }}
          aws-region: us-east-1
          audience: sts.amazonaws.com
          mask-aws-account-id: 'false'

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Kubernetes
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.resolve-tag.outputs.eks_cluster }}
          kubectl get ns ${{ env.K8S_NAMESPACE }} || { echo "::error::Namespace ${{ env.K8S_NAMESPACE }} not found"; exit 1; }

      - name: Deployment Summary
        run: |
          echo "🚀 Deployment Summary:"
          echo "  Environment: ${{ inputs.environment }}"
          echo "  EKS Cluster: ${{ needs.resolve-tag.outputs.eks_cluster }}"
          echo "  Namespace: ${{ env.K8S_NAMESPACE }}"
          echo "  Deployment: ${{ env.K8S_DEPLOYMENT }}"
          echo "  Image: ${{ needs.resolve-tag.outputs.image }}"
          echo "  Dry Run: ${{ inputs.dry_run }}"
          echo ""
          echo "Current deployment:"
          kubectl get deployment ${{ env.K8S_DEPLOYMENT }} -n ${{ env.K8S_NAMESPACE }} -o wide

      - name: Deploy (Update Image)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          IMAGE="${{ needs.resolve-tag.outputs.image }}"
          echo "Updating image to: $IMAGE"

          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_CONTAINER }}="$IMAGE" \
            -n ${{ env.K8S_NAMESPACE }}

          echo "⏳ Waiting for rollout..."
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

          echo ""
          echo "✅ Deployment complete!"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=image-transformation

      - name: Dry Run Output
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          IMAGE="${{ needs.resolve-tag.outputs.image }}"
          echo "🔍 DRY RUN — would execute:"
          echo "  kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} ${{ env.K8S_CONTAINER }}=$IMAGE -n ${{ env.K8S_NAMESPACE }}"
          echo ""
          echo "Current pods:"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=image-transformation
          echo ""
          echo "Current image:"
          kubectl get deployment ${{ env.K8S_DEPLOYMENT }} -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

      - name: Slack Notification
        if: always() && inputs.dry_run == 'false'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.CAPTAIN_DEVOPS_SLACK_BOT_TOKEN }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            EMOJI="✅"; STATUS="succeeded"
          else
            EMOJI="❌"; STATUS="failed"
          fi

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C03G3GLMCUA\",
              \"text\": \"${EMOJI} *DIT CD ${STATUS}*\n🌍 Environment: \`${{ inputs.environment }}\`\n🏷️ Tag: \`${{ needs.resolve-tag.outputs.tag }}\`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔗 View Run>\"
            }"
