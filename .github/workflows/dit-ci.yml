name: CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        default: 'main'
        type: string
  push:
    branches: [main, master, hotfix_*, release_fix*]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 699475938885.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: punchh/dynamic-image-transformation
  DYNAMO_TABLE: punchh-ServicesVersion
  DYNAMO_ROLE_ARN: arn:aws:iam::569345298987:role/punchh-ServicesVersionRole

permissions:
  id-token: write
  contents: write

jobs:
  ci-build:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.git-tag.outputs.tag }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies for Snyk
        run: |
          cd source
          npm ci

      - name: Snyk Security Scan
        uses: punchh/GHA-central-workflow/.github/actions/snyk-scan@main
        with:
          technology: node
          repository: punchh/amazon-cloudfront-dit
          branch: ${{ inputs.branch || github.ref_name }}
          snyk_token: ${{ secrets.SVC_ACCOUNT_SNYK_ORG_TOKEN }}
          snyk_org_id: par-tech-poc
          severity_threshold: high
          triggered_user: '<!here>'
          slack_bot_token: ${{ secrets.CAPTAIN_DEVOPS_SLACK_BOT_TOKEN }}

      - name: Configure AWS credentials for ECR
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::699475938885:role/ecr-access/punchh/amazon-cloudfront-dit
          aws-region: us-east-1
          audience: sts.amazonaws.com
          mask-aws-account-id: 'false'

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          mask-password: 'false'

      - name: Generate Git Tag
        id: git-tag
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"

          if [[ "$BRANCH" == "master" || "$BRANCH" == "main" || "$BRANCH" =~ ^hotfix_ || "$BRANCH" =~ ^release_fix ]]; then
            # Finds the latest semver git tag (supports 3 or 4 segments, e.g., v8.0.5.3)
            CURRENT_TAG=$(git tag -l --sort=v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -t. -k1,1n -k2,2n -k3,3n -k4,4n | tail -n1 || true)
            echo "Current tag: ${CURRENT_TAG:-none}"

            if [ -z "$CURRENT_TAG" ]; then
              NEW_TAG="v8.0.0.1"
            else
              # Increment last segment (v8.0.5.3 → v8.0.5.4)
              PREFIX=$(echo "$CURRENT_TAG" | sed 's/\.[0-9]*$//')
              LAST=$(echo "$CURRENT_TAG" | grep -oE '[0-9]+$')
              NEW_TAG="${PREFIX}.$((LAST + 1))"
            fi
            echo "CREATE_GIT_TAG=true" >> $GITHUB_ENV
          else
            NEW_TAG="$BRANCH"
            echo "CREATE_GIT_TAG=false" >> $GITHUB_ENV
          fi

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "📦 Image tag: $NEW_TAG"

      - name: Build Docker Image
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Building: $IMAGE"
          cd source
          docker build -t "$IMAGE" -f Dockerfile .

      - name: Push Docker Image to ECR
        run: |
          docker push "$IMAGE"
          echo "✅ Pushed: $IMAGE"

          if [[ "$CREATE_GIT_TAG" == "true" ]]; then
            LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
            docker tag "$IMAGE" "$LATEST"
            docker push "$LATEST"
            echo "✅ Pushed: $LATEST"
          fi

      - name: Create Git Tag
        if: ${{ env.CREATE_GIT_TAG == 'true' }}
        run: |
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git tag -a "$TAG" -m "Release $TAG via CI"
          git push origin "$TAG"
          echo "✅ Git tag $TAG created"

      - name: Configure AWS credentials for DynamoDB
        if: ${{ env.CREATE_GIT_TAG == 'true' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.DYNAMO_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Publish tag to DynamoDB
        if: ${{ env.CREATE_GIT_TAG == 'true' }}
        run: |
          PK="ENV#development"
          SK="STACK#default#REPO#dynamic-image-transformation"

          EXISTING=$(aws dynamodb get-item \
            --table-name "$DYNAMO_TABLE" \
            --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" \
            --output json 2>/dev/null || true)

          if [ -z "$EXISTING" ]; then EXISTING="{}"; fi

          if echo "$EXISTING" | jq -e '.Item.tags.L' >/dev/null 2>&1; then
            CURRENT_TAGS=$(echo "$EXISTING" | jq -r '[.Item.tags.L[].S]')
          else
            CURRENT_TAGS="[]"
          fi

          TAGS_JSON=$(echo "$CURRENT_TAGS" | jq -c --arg tag "$TAG" \
            '(. + [$tag]) | .[-5:] | {"L": [.[] | {"S": .}]}')

          aws dynamodb update-item \
            --table-name "$DYNAMO_TABLE" \
            --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" \
            --update-expression "SET tags = :tags, updatedAt = :ts, promotedFrom = :pf" \
            --expression-attribute-values "{\":tags\": $TAGS_JSON, \":ts\": {\"S\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}, \":pf\": {\"NULL\": true}}" \
            --return-values NONE

          echo "✅ Tag $TAG published to DynamoDB"
